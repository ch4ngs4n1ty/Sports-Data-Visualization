<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlayIQ — Deep Game Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div class="grain"></div>

  <!-- ── HEADER ─────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">PLAY<span>IQ</span></div>
      <span class="tagline">Deep Game Analysis</span>
    </div>
    <div class="topbar-right">
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="Claude API key (sk-ant-...)" />
        <button onclick="saveKey()">SAVE</button>
        <span id="keySaved"></span>
      </div>
    </div>
  </header>

  <!-- ── DASHBOARD ──────────────────────────────────── -->
  <section class="dashboard-section" id="dashboardSection">

    <div class="dashboard-controls">
      <div class="dashboard-title-row">
        <h2 class="dashboard-heading">Today's Games</h2>
        <span class="dashboard-date" id="dashboardDate"></span>
      </div>
      <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
    </div>

    <!-- ERROR BANNER -->
    <div class="error-banner hidden" id="errorBanner">
      <div class="error-banner-inner">
        <span class="error-icon">⚠</span>
        <div class="error-text">
          <strong id="errorMessage">Error</strong>
          <span id="errorHint"></span>
        </div>
        <button class="error-dismiss" onclick="document.getElementById('errorBanner').classList.add('hidden')">✕</button>
      </div>
    </div>

    <!-- GAMES CONTENT -->
    <div id="dashboardContent"></div>

  </section>

  <!-- ── ANALYSIS PANEL ─────────────────────────────── -->
  <section class="analysis-panel hidden" id="analysisPanel">

    <!-- GAME HEADER -->
    <div class="game-header" id="gameHeader">
      <button class="back-btn" onclick="resetToDashboard()">← All Games</button>
      <div class="game-title-block">
        <div class="game-badge" id="gameSport">—</div>
        <h2 class="game-title" id="gameTitle">Team A vs Team B</h2>
        <div class="game-meta" id="gameMeta">—</div>
      </div>
      <div class="game-odds-strip" id="gameOddsStrip"></div>
    </div>

    <!-- LOADING STATE -->
    <div class="full-loader hidden" id="fullLoader">
      <div class="loader-inner">
        <div class="loader-spinner"></div>
        <div class="loader-steps" id="loaderSteps">
          <span class="step active">Loading game data</span>
          <span class="step">Fetching injuries</span>
          <span class="step">Last 5 games</span>
          <span class="step">Head-to-head history</span>
          <span class="step">Rosters</span>
          <span class="step">Generating AI plays</span>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tab-bar" id="tabBar">
      <button class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
      <button class="tab" data-tab="roster" onclick="switchTab('roster')">Rosters</button>
      <button class="tab" data-tab="form" onclick="switchTab('form')">Last 5 Games</button>
      <button class="tab" data-tab="h2h" onclick="switchTab('h2h')">Head-to-Head</button>
      <button class="tab tab-ai" data-tab="plays" onclick="switchTab('plays')">◆ AI Plays</button>
    </div>

    <!-- TAB CONTENT -->
    <div class="tab-content">

      <!-- OVERVIEW -->
      <div class="tab-pane active" id="tab-overview">
        <div class="two-col">
          <div class="team-col" id="teamColAway"></div>
          <div class="vs-divider">
            <span>VS</span>
            <div class="matchup-stats" id="matchupStats"></div>
          </div>
          <div class="team-col" id="teamColHome"></div>
        </div>
        <div class="overview-charts" id="overviewCharts"></div>
      </div>

      <!-- ROSTER -->
      <div class="tab-pane hidden" id="tab-roster">
        <div class="roster-grid" id="rosterGrid"></div>
      </div>

      <!-- FORM (last 5) -->
      <div class="tab-pane hidden" id="tab-form">
        <div class="form-grid" id="formGrid"></div>
      </div>

      <!-- H2H -->
      <div class="tab-pane hidden" id="tab-h2h">
        <div id="h2hContent"></div>
      </div>

<!-- AI PLAYS -->
      <div class="tab-pane hidden" id="tab-plays">
        <div class="plays-layout">

          <!-- AI RECOMMENDED -->
          <div class="plays-section" id="aiPlaysSection">
            <div class="section-head">
              <h3>◆ AI Recommended Plays</h3>
              <span class="powered">Powered by Claude</span>
            </div>
            <div id="aiPlaysList"></div>
          </div>

          <!-- YOUR PLAY DISCUSSION -->
          <div class="plays-section your-play-section">
            <div class="section-head">
              <h3>Your Play</h3>
              <span class="powered">Discuss with Claude</span>
            </div>
            <div class="your-play-input">
              <textarea id="userPlay" placeholder="Enter your play... e.g. 'Lakers -4.5' or 'Over 224.5' or 'LeBron over 25.5 pts' or a parlay..."></textarea>
              <button class="discuss-btn" onclick="discussUserPlay()">DISCUSS →</button>
            </div>
            <div id="userPlayResult" class="user-play-result hidden"></div>
          </div>

        </div>
      </div>

    </div>
  </section>

  <!-- PLAYER STATS MODAL -->
  <div class="player-modal hidden" id="playerModal" onclick="closePlayerModal(event)">
    <div class="player-modal-inner">
      <div class="player-modal-header">
        <span class="player-modal-name" id="playerModalName"></span>
        <div class="stat-toggle">
          <button class="stat-btn active" onclick="switchPlayerModalStat('pts', this)">PTS</button>
          <button class="stat-btn" onclick="switchPlayerModalStat('reb', this)">REB</button>
          <button class="stat-btn" onclick="switchPlayerModalStat('ast', this)">AST</button>
        </div>
        <button class="player-modal-close" onclick="document.getElementById('playerModal').classList.add('hidden')">✕</button>
      </div>
      <div id="playerModalLoading" class="inline-loader hidden"><div class="mini-spin"></div> Loading stats...</div>
      <canvas id="playerModalChart" height="200"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
