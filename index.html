<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PlayIQ — Deep Game Analysis</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#05080f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PlayIQ" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Shared + sport-specific data layer -->
  <script src="frontend/data/shared/core.js"></script>
  <script src="frontend/data/mlb/index.js"></script>
  <script src="frontend/data/nba/index.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #05080f;
      --surface: #090d1a;
      --card:    #0d1524;
      --cyan:    #00d4ff;
      --green:   #00ff88;
      --orange:  #ff6b35;
      --gold:    #ffd060;
      --text:    #c0d4e8;
      --muted:   #4a6080;
      --dim:     #2a3a50;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; overflow-x: hidden; }

    /* Scanlines */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px);
    }

    /* Grid bg */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(0,212,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.022) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    #root { position: relative; z-index: 1; min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.18); border-radius: 2px; }

    /* Keyframes */
    @keyframes livePulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    @keyframes fadeUp      { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes glowPulse   { 0%,100%{text-shadow:0 0 10px rgba(0,212,255,.35)} 50%{text-shadow:0 0 28px rgba(0,212,255,.75),0 0 56px rgba(0,212,255,.2)} }

    .screen-enter { animation: fadeUp 0.28s ease; }

    /* Top nav */
    .topnav {
      position: sticky; top: 0; z-index: 200;
      height: 52px; display: flex; align-items: center; gap: 16px; padding: 0 24px;
      background: rgba(5,8,15,0.94); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,212,255,0.07);
    }
    .logo {
      font-family: 'Orbitron', monospace; font-weight: 900; font-size: 18px;
      color: var(--cyan); letter-spacing: 0.1em; cursor: pointer;
      animation: glowPulse 3.5s ease-in-out infinite; user-select: none;
      text-decoration: none;
    }
    .logo span { color: rgba(0,212,255,0.35); }
    .nav-sep  { width: 1px; height: 20px; background: rgba(0,212,255,0.1); }
    .nav-bc   { flex: 1; font-size: 10px; color: var(--muted); letter-spacing: 0.18em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-status { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--dim); letter-spacing: 0.12em; flex-shrink: 0; }
    .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: livePulse 2.2s ease-in-out infinite; }

    /* API key row */
    .api-row { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .api-row input {
      background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.15);
      color: var(--text); font-family: 'Space Mono', monospace; font-size: 10px;
      padding: 5px 10px; border-radius: 2px; width: 180px; letter-spacing: 0.05em;
    }
    .api-row input::placeholder { color: var(--dim); }
    .api-row input:focus { border-color: rgba(0,212,255,0.4); outline: none; }
    .api-row button {
      background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.25);
      color: var(--cyan); font-family: 'Space Mono', monospace; font-size: 9px;
      padding: 5px 10px; letter-spacing: 0.12em; cursor: pointer; border-radius: 2px;
      transition: all 0.15s;
    }
    .api-row button:hover { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.4); }
    .api-row .saved { font-size: 9px; color: var(--green); font-family: 'Space Mono', monospace; letterSpacing: 0.1em; }

    /* Date input */
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.5) sepia(1) saturate(5) hue-rotate(170deg); cursor: pointer; }
    input[type="date"] { color-scheme: dark; }
    textarea:focus, input:focus { outline: none; }

    /* Tweaks panel */
    .tweaks {
      position: fixed; bottom: 20px; right: 20px; width: 230px; z-index: 300;
      background: rgba(9,13,26,0.97); border: 1px solid rgba(0,212,255,0.2);
      border-radius: 4px; padding: 16px; backdrop-filter: blur(20px);
      display: none; font-family: 'Space Mono', monospace;
    }
    .tweaks.open { display: block; animation: fadeUp .18s ease; }
    .tw-title { font-size: 9px; color: var(--cyan); letter-spacing: 0.22em; margin-bottom: 14px; }
    .tw-row   { margin-bottom: 12px; }
    .tw-lbl   { font-size: 9px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 5px; }
    .tw-opts  { display: flex; gap: 6px; flex-wrap: wrap; }
    .tw-btn   { font-size: 9px; font-family: 'Space Mono', monospace; padding: 4px 9px; border-radius: 2px;
                cursor: pointer; border: 1px solid rgba(0,212,255,0.15); background: transparent;
                color: var(--muted); transition: all .15s; }
    .tw-btn.on{ border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.08); }
  </style>
</head>
<body>
<div id="root"></div>

<!-- Component scripts (Babel-transpiled in the browser) -->
<script type="text/babel" src="frontend/shared/ui-atoms.jsx"></script>
<script type="text/babel" src="frontend/shared/tabs/common-tabs.jsx"></script>
<script type="text/babel" src="frontend/sports/mlb/tabs.jsx"></script>
<script type="text/babel" src="frontend/sports/nba/tabs.jsx"></script>
<script type="text/babel" src="frontend/shared/screens/home-screen.jsx"></script>
<script type="text/babel" src="frontend/shared/screens/games-screen.jsx"></script>
<script type="text/babel" src="frontend/shared/screens/game-detail-screen.jsx"></script>

<script type="text/babel">
/* ── TWEAK DEFAULTS ──────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00d4ff",
  "gridLines": true,
  "scanlines": true,
  "density": "comfortable"
}/*EDITMODE-END*/;

/* ── API KEY INPUT ───────────────────────────────────── */
function ApiKeyInput() {
  const [val, setVal] = React.useState(() => localStorage.getItem('piq_key') || '');
  const [savedTick, setSavedTick] = React.useState(false);

  const save = () => {
    const v = val.trim();
    if (v) localStorage.setItem('piq_key', v);
    else   localStorage.removeItem('piq_key');
    setSavedTick(true);
    setTimeout(() => setSavedTick(false), 1600);
  };

  return (
    <div className="api-row">
      <input
        type="password"
        value={val}
        onChange={e => setVal(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter') save(); }}
        placeholder="Claude API key (sk-ant-…)"
      />
      <button onClick={save}>SAVE</button>
      {savedTick && <span className="saved">● SAVED</span>}
    </div>
  );
}

/* ── APP ROOT ────────────────────────────────────────── */
function App() {
  const [view, setView] = React.useState(() => {
    try { return JSON.parse(sessionStorage.getItem('piq_view') || '{}').view || 'home'; } catch { return 'home'; }
  });
  const [selectedSport, setSelectedSport] = React.useState('mlb');
  const [selectedGame, setSelectedGame] = React.useState(() => {
    try { const s = sessionStorage.getItem('piq_game'); return s ? JSON.parse(s) : null; } catch { return null; }
  });

  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const applyTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    if (key === 'accentColor') document.documentElement.style.setProperty('--cyan', val);
    if (key === 'gridLines')   document.body.style.backgroundImage = val
      ? 'linear-gradient(rgba(0,212,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.022) 1px,transparent 1px)' : 'none';
  };

  React.useEffect(() => {
    document.documentElement.style.setProperty('--cyan', tweaks.accentColor);
  }, []);

  // Persist nav
  const goHome   = () => { setView('home');  sessionStorage.setItem('piq_view', JSON.stringify({ view:'home'  })); };
  const goGames  = (sport) => { setSelectedSport(sport); setView('games'); sessionStorage.setItem('piq_view', JSON.stringify({ view:'games' })); };
  const goDetail = (game)  => {
    setSelectedGame(game); setView('detail');
    sessionStorage.setItem('piq_game', JSON.stringify(game));
    sessionStorage.setItem('piq_view', JSON.stringify({ view:'detail' }));
  };

  // Restore detail view from session
  React.useEffect(() => {
    if (view === 'detail' && !selectedGame) setView('games');
  }, []);

  const breadcrumb = {
    home:   'PLAYIQ · SELECT SPORT',
    games:  `${selectedSport.toUpperCase()} · TODAY'S GAMES`,
    detail: selectedGame ? `${selectedGame.awayAbbr} @ ${selectedGame.homeAbbr}` : '—',
  }[view];

  return (
    <>
      {/* Nav */}
      <nav className="topnav">
        <div className="logo" onClick={goHome}>PLAY<span>IQ</span></div>
        <div className="nav-sep" />
        <div className="nav-bc">{breadcrumb}</div>
        <ApiKeyInput />
        <div className="nav-sep" />
        <div className="nav-status">
          <div className="nav-dot" />
          <span>{window.API_BASE || 'localhost:3001'}</span>
        </div>
      </nav>

      {/* Screens */}
      <main>
        {view === 'home'   && <div className="screen-enter"><HomeScreen   onSelectSport={goGames} /></div>}
        {view === 'games'  && <div className="screen-enter"><GamesScreen  onSelectGame={goDetail} onBack={goHome} /></div>}
        {view === 'detail' && selectedGame && <div className="screen-enter"><GameDetailScreen game={selectedGame} onBack={() => setView('games')} /></div>}
      </main>

      {/* Tweaks */}
      <div className={`tweaks ${tweaksOpen ? 'open' : ''}`}>
        <div className="tw-title">TWEAKS</div>

        <div className="tw-row">
          <div className="tw-lbl">ACCENT COLOR</div>
          <div className="tw-opts">
            {[['#00d4ff','CYAN'],['#00ff88','GREEN'],['#ff6b35','EMBER'],['#a855f7','VIOLET'],['#ffd060','GOLD']].map(([c,l]) => (
              <button key={c} className={`tw-btn ${tweaks.accentColor===c?'on':''}`}
                style={tweaks.accentColor===c?{borderColor:c,color:c}:{}}
                onClick={() => applyTweak('accentColor', c)}>{l}</button>
            ))}
          </div>
        </div>

        <div className="tw-row">
          <div className="tw-lbl">GRID LINES</div>
          <div className="tw-opts">
            {[['true','ON'],['false','OFF']].map(([v,l]) => (
              <button key={v} className={`tw-btn ${String(tweaks.gridLines)===v?'on':''}`}
                onClick={() => applyTweak('gridLines', v==='true')}>{l}</button>
            ))}
          </div>
        </div>

        <div className="tw-row">
          <div className="tw-lbl">SCANLINES</div>
          <div className="tw-opts">
            {[['true','ON'],['false','OFF']].map(([v,l]) => (
              <button key={v} className={`tw-btn ${String(tweaks.scanlines)===v?'on':''}`}
                onClick={() => {
                  applyTweak('scanlines', v==='true');
                  document.body.style.setProperty('--scanlines-opacity', v==='true'?'1':'0');
                }}>{l}</button>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
